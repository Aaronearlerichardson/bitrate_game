name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x86_64
            launcher: ./dist/bitrate_game-linux-x86_64 --smoke-test
          - os: ubuntu-22.04-arm
            target: linux-arm64
            launcher: ./dist/bitrate_game-linux-arm64 --smoke-test
          - os: macos-13
            target: macos-x86_64
            launcher: ./dist/bitrate_game-macos-x86_64 --smoke-test
          - os: macos-14
            target: macos-arm64
            launcher: ./dist/bitrate_game-macos-arm64 --smoke-test
          - os: windows-latest
            target: windows-x86_64
            launcher: ./dist/bitrate_game-windows-x86_64.exe --smoke-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      # SDL2 runtime libs help pygame's bundled SDL find system audio/video shims
      # when launched. Harmless if pygame's vendored copy supersedes them.
      - name: Install SDL2 runtime (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-2.0-0 libsdl2-image-2.0-0 \
            libsdl2-mixer-2.0-0 libsdl2-ttf-2.0-0

      - name: Install Nuitka and project
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install .

      - name: Build binary
        run: python scripts/build.py

      - name: Smoke test
        timeout-minutes: 2
        shell: bash
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: ${{ matrix.launcher }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bitrate_game-${{ matrix.target }}
          path: dist/bitrate_game-${{ matrix.target }}*
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          fail_on_unmatched_files: true
