name: build

# Builds one onefile binary per OS via Nuitka-Action, smoke-tests each, then
# bundles all three into a single bitrate_game-binaries.zip. On a tag push
# (v*), the zip is attached to a GitHub Release.
#
# The Nuitka flags here mirror scripts/build.py. If you change one, change
# the other so local builds and CI builds agree.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write  # required for the release-attach step

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x86_64
            ext: ''
          - os: macos-14
            target: macos-arm64
            ext: ''
          - os: windows-latest
            target: windows-x86_64
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml

      # SDL2 runtime libs help pygame's bundled SDL find system audio/video
      # shims when launched. Harmless if pygame's vendored copy supersedes.
      - name: Install SDL2 runtime (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-2.0-0 libsdl2-ttf-2.0-0

      - name: Install runtime deps
        run: pip install "pygame>=2.5"

      # The pygame wheel bundles every SDL satellite (mixer/image), every
      # audio backend (Pulse/ALSA/JACK/...), and every codec — Nuitka picks
      # them up via real dynamic-link inspection regardless of any Python-
      # level --nofollow-import-to we pass. Physically removing them from
      # the installed pygame is the only reliable way to keep them out of
      # the final binary. See scripts/strip_pygame.py for the rationale and
      # the exact list (cross-checked against pygame/__init__.py's
      # try/except wrappers).
      - name: Strip unused pygame submodules and bundled libs
        run: python scripts/strip_pygame.py

      # --- Nuitka build via Nuitka-Action (Option A) ---
      #
      # Slim flags drop everything the game doesn't use. Verified by grepping
      # src/bitrate_game for pygame.* usage: only event, display,
      # font.SysFont, time, draw, Rect, Surface are referenced — so mixer,
      # image, midi, camera, cdrom and all their native deps are safe to
      # exclude. The leading '*' on the lib patterns is required to match
      # Linux versioned sonames like 'libSDL2_mixer-2.0.so.0'.
      #
      # Audio backends (Pulse/ALSA/JACK/sndio/PipeWire/fluidsynth) are bundled
      # by the pygame manylinux wheel even though the game has no audio —
      # excluding them is the biggest single size win on Linux.
      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: src/bitrate_game
          # 'mode: onefile' replaces the old standalone+onefile pair. The
          # 'pygame' plugin no longer exists in current Nuitka — pygame is
          # auto-detected, so we do NOT pass enable-plugins.
          mode: onefile
          include-package: bitrate_game

          lto: yes
          # Tried 'yes' to force static-link of libpython (would save ~6.8 MB
          # of bundled libpython3.13.so on Linux), but setup-python's CPython
          # builds on Linux/Windows don't ship the static archive in a form
          # Nuitka accepts — fails with "a static libpython is either not
          # found or not supported for this Python (CPython Official)
          # installation". 'auto' falls back to dynamic where static isn't
          # available; strip_pygame.py alone gets us under the size budget.
          static-libpython: auto
          python-flag: no_site,no_asserts,no_warnings,no_docstrings

          # Aggressive exclude list. Beyond the audio submodules and stdlib
          # dead weight, also drops pygame's numpy-coupled views (surfarray,
          # sndarray), the geometry/transform helpers we don't call, the
          # clipboard module, and the bundled examples/tests. numpy itself
          # is excluded in case any of those pull it in transitively (a 30 MB
          # win if so).
          nofollow-import-to: pygame.mixer,pygame.mixer_music,pygame.image,pygame.midi,pygame.camera,pygame.cdrom,pygame._sdl2.audio,pygame._sdl2.mixer,pygame.surfarray,pygame.sndarray,pygame.scrap,pygame.transform,pygame.gfxdraw,pygame.fastevent,pygame.examples,pygame.tests,pygame.docs,numpy,tkinter,unittest,test,pydoc,idlelib,ensurepip,lib2to3,turtle,turtledemo

          # Nuitka-Action only exposes --noinclude-data-files (not
          # --noinclude-dlls). Bundled SDL .so/.dylib files on Linux/macOS are
          # picked up as data files by the auto-detected pygame handling, so
          # this single list covers the platforms where the wheel is bloated.
          # On Windows, vendored DLLs may slip through — acceptable since the
          # Windows binary was already ~9.7 MB.
          noinclude-data-files: '*SDL2_mixer*,*SDL2_image*,*libogg*,*libvorbis*,*libvorbisfile*,*libFLAC*,*libopus*,*libopusfile*,*libmpg123*,*libwavpack*,*libmodplug*,*libfluidsynth*,*libsndfile*,*libwebp*,*libjpeg*,*libtiff*,*libpulse*,*libpulsecommon*,*libasound*,*libsndio*,*libjack*,*libpipewire*,*portmidi*'

          # Emit a build report we can grep for unexpectedly-large modules.
          # The report names every module/data file that ended up in the
          # binary, with sizes. Uploaded as an artifact below.
          report: nuitka-report.xml

          output-file: bitrate_game-${{ matrix.target }}${{ matrix.ext }}

      - name: Move binary into dist/
        shell: bash
        run: |
          mkdir -p dist
          mv build/bitrate_game-${{ matrix.target }}${{ matrix.ext }} dist/
          ls -lh dist/

      - name: Upload Nuitka report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuitka-report-${{ matrix.target }}
          path: nuitka-report.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Smoke test
        timeout-minutes: 2
        shell: bash
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: ./dist/bitrate_game-${{ matrix.target }}${{ matrix.ext }} --smoke-test

      - uses: actions/upload-artifact@v4
        with:
          name: bitrate_game-${{ matrix.target }}
          path: dist/bitrate_game-${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 14

  package:
    name: bundle-zip
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Zip all binaries into a single archive
        run: |
          cd dist
          chmod +x bitrate_game-linux-* bitrate_game-macos-* 2>/dev/null || true
          ls -lh
          zip -9 ../bitrate_game-binaries.zip *
          ls -lh ../bitrate_game-binaries.zip

      - uses: actions/upload-artifact@v4
        with:
          name: bitrate_game-binaries
          path: bitrate_game-binaries.zip
          if-no-files-found: error

  release:
    name: release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bitrate_game-binaries
          path: .

      - uses: softprops/action-gh-release@v2
        with:
          files: bitrate_game-binaries.zip
          fail_on_unmatched_files: true
